<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Vulnerability Scanner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #0f0f1a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #00d4ff;
        }
        p.subtitle {
            color: #aaa;
            margin-bottom: 30px;
        }
        .input-section {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 700px;
            margin-bottom: 30px;
        }
        input[type="text"] {
            flex: 1;
            padding: 14px 18px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #1a1a2e;
            color: #fff;
            font-size: 1rem;
        }
        button {
            padding: 14px 28px;
            background: #00d4ff;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #00b8d9; }
        button:disabled { background: #555; cursor: not-allowed; }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-box {
            background: #1a1a2e;
            border-radius: 10px;
            padding: 20px 30px;
            text-align: center;
            min-width: 140px;
        }
        .stat-box h2 { font-size: 2rem; }
        .stat-box p { color: #aaa; font-size: 0.85rem; margin-top: 5px; }
        .stat-box.total h2 { color: #00d4ff; }
        .stat-box.vuln h2  { color: #ff4d4d; }
        .stat-box.safe h2  { color: #4dff88; }

        .results {
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .result-card {
            background: #1a1a2e;
            border-radius: 10px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid transparent;
        }
        .result-card.vulnerable { border-left-color: #ff4d4d; }
        .result-card.safe       { border-left-color: #4dff88; }

        .result-info h3 { font-size: 1rem; margin-bottom: 4px; }
        .result-info p  { font-size: 0.8rem; color: #aaa; }

        .badges { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
        .severity {
            font-size: 0.75rem;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: bold;
        }
        .severity.Critical { background: #ff1a1a; color: #fff; }
        .severity.High     { background: #ff6600; color: #fff; }
        .severity.Medium   { background: #ffcc00; color: #000; }
        .severity.Low      { background: #4dff88; color: #000; }

        .status {
            font-size: 0.75rem;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: bold;
        }
        .status.vulnerable { background: #ff4d4d22; color: #ff4d4d; border: 1px solid #ff4d4d; }
        .status.safe       { background: #4dff8822; color: #4dff88; border: 1px solid #4dff88; }

        .loading { color: #aaa; font-size: 1rem; margin-top: 20px; display: none; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <h1>🔍 URL Vulnerability Scanner</h1>
    <p class="subtitle">Enter a URL to scan for common vulnerabilities</p>

    <div class="input-section">
        <input type="text" id="urlInput" placeholder="https://example.com?id=1" />
        <button id="scanBtn" onclick="scanURL()">Scan</button>
    </div>

    <p class="loading" id="loading">⏳ Scanning... please wait</p>

    <div class="stats hidden" id="stats">
        <div class="stat-box total">
            <h2 id="totalCount">0</h2>
            <p>Total Tests</p>
        </div>
        <div class="stat-box vuln">
            <h2 id="vulnCount">0</h2>
            <p>Vulnerable</p>
        </div>
        <div class="stat-box safe">
            <h2 id="safeCount">0</h2>
            <p>Safe</p>
        </div>
    </div>

    <div class="results" id="results"></div>

    <script>
        async function scanURL() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) {
                alert('Please enter a URL!');
                return;
            }

            // Show loading
            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').innerHTML = '';
            document.getElementById('stats').classList.add('hidden');
            document.getElementById('scanBtn').disabled = true;

            try {
                const response = await fetch('http://127.0.0.1:5000/scan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();

                if (data.success) {
                    // Update stats
                    document.getElementById('totalCount').textContent = data.stats.total_tests;
                    document.getElementById('vulnCount').textContent  = data.stats.vulnerable;
                    document.getElementById('safeCount').textContent  = data.stats.safe_count;
                    document.getElementById('stats').classList.remove('hidden');

                    // Show results
                    const container = document.getElementById('results');
                    data.results.forEach(result => {
                        const card = document.createElement('div');
                        card.className = `result-card ${result.vulnerable ? 'vulnerable' : 'safe'}`;
                        card.innerHTML = `
                            <div class="result-info">
                                <h3>${result.name}</h3>
                                <p>${result.description}</p>
                            </div>
                            <div class="badges">
                                <span class="severity ${result.severity}">${result.severity}</span>
                                <span class="status ${result.vulnerable ? 'vulnerable' : 'safe'}">
                                    ${result.vulnerable ? '⚠️ Vulnerable' : '✅ Safe'}
                                </span>
                            </div>
                        `;
                        container.appendChild(card);
                    });
                }
            } catch (error) {
                alert('Error connecting to server. Make sure url.py is running!');
            }

            document.getElementById('loading').style.display = 'none';
            document.getElementById('scanBtn').disabled = false;
        }
    </script>

</body>
</html>
